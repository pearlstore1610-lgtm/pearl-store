<!DOCTYPE html>
<html lang="ar" dir="rtl" id="mainHtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pearl | Official Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Segoe+UI:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --nibeti: #630d0d; --soft-bg: rgba(255, 248, 240, 0.6); }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Segoe UI', sans-serif; margin: 0; background-color: #fff;
            background-image: url('Logo-img.jpeg'); background-repeat: no-repeat;
            background-position: center 200px; background-size: 80%; background-attachment: fixed;
            position: relative; overflow-x: hidden;
        }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.75); z-index: -1; }

        header {
            background-color: var(--nibeti); color: white; padding: 12px 5%;
            display: grid; grid-template-columns: auto 1fr auto; align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); position: sticky; top: 0; z-index: 1000;
        }
        .header-logo { height: 45px; mix-blend-mode: screen; }
        .main-nav { display: flex; justify-content: center; gap: 20px; }
        .main-nav a { color: white; text-decoration: none; font-weight: 600; font-size: 14px; transition: 0.3s; cursor: pointer; }
        
        #cartSidebar {
            position: fixed; top: 0; right: -350px; width: 320px; height: 100%;
            background: white; box-shadow: -5px 0 15px rgba(0,0,0,0.2); transition: 0.4s;
            z-index: 2000; padding: 20px; display: flex; flex-direction: column;
        }
        #cartSidebar.open { right: 0; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding: 10px 0; }
        
        .order-form { margin-top: auto; border-top: 2px solid #eee; padding-top: 15px; }
        .order-form input, .order-form textarea {
            width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd;
            border-radius: 8px; box-sizing: border-box; font-family: inherit; resize: none;
        }

        .btn-order {
            background: #25d366; color: white; border: none; padding: 12px;
            border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%;
            font-size: 16px; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-order:hover { background: #1ebe57; }
    </style>
</head>
<body>

<header>
    <img src="Logo-img.jpeg" class="header-logo" alt="Logo">
    <nav class="main-nav">
        <a href="#">الرئيسية</a>
        <a onclick="toggleCart()"><i class="fa fa-shopping-cart"></i> السلة (<span id="cartCount">0</span>)</a>
    </nav>
</header>

<div id="cartSidebar">
    <h3 style="color: var(--nibeti);">سلة المشتريات 
        <button onclick="toggleCart()" style="float: left; background: none; border: none; font-size: 24px; cursor: pointer;">&times;</button>
    </h3>
    <div id="cartItems" style="flex-grow: 1; overflow-y: auto;">
        </div>
    
    <div class="order-form">
        <h4 style="margin-bottom: 10px; color: #333;">تفاصيل الاستلام:</h4>
        <input type="text" id="customerName" placeholder="الاسم الكامل" required>
        <textarea id="customerAddress" placeholder="عنوان التوصيل (مثلاً: المقطم امام قسم المقطم)" rows="2" required></textarea>
        
        <div style="margin: 15px 0; font-size: 18px; font-weight: bold; color: var(--nibeti); display: flex; justify-content: space-between;">
            <span>إجمالي المبلغ:</span>
            <span><span id="cartTotalSum">0</span> EGP</span>
        </div>
        
        <button class="btn-order" onclick="sendOrder()">
            <i class="fab fa-whatsapp"></i> إرسال الطلب عبر واتساب
        </button>
    </div>
</div>

<script>
    let cart = [];

    function toggleCart() {
        document.getElementById('cartSidebar').classList.toggle('open');
    }

    // دالة تحديث السلة (تأكد من استدعائها عند الضغط على زر "أضف للسلة" في منتجاتك)
    function updateCartUI() {
        const cartItems = document.getElementById('cartItems');
        const cartCount = document.getElementById('cartCount');
        const totalSum = document.getElementById('cartTotalSum');
        let count = 0; let total = 0;
        
        cartItems.innerHTML = cart.map(item => {
            count += item.qty;
            total += (item.price * item.qty);
            return `
                <div class="cart-item">
                    <div>
                        <div style="font-weight:bold;">${item.titleAr}</div>
                        <small>${item.price} EGP × ${item.qty}</small>
                    </div>
                    <div style="display:flex; gap:5px; align-items:center;">
                        <button onclick="changeQty('${item.id}', -1)" style="width:25px; cursor:pointer;">-</button>
                        <span>${item.qty}</span>
                        <button onclick="changeQty('${item.id}', 1)" style="width:25px; cursor:pointer;">+</button>
                    </div>
                </div>`;
        }).join('');
        cartCount.innerText = count;
        totalSum.innerText = total;
    }

    function changeQty(id, delta) {
        const item = cart.find(i => i.id === id);
        if (item) {
            item.qty += delta;
            if (item.qty <= 0) cart = cart.filter(i => i.id !== id);
            updateCartUI();
        }
    }

    function sendOrder() {
        const name = document.getElementById('customerName').value;
        const address = document.getElementById('customerAddress').value;
        const orderId = Math.floor(Math.random() * 90000) + 10000; // رقم طلب عشوائي

        if (cart.length === 0) return alert("السلة فارغة! يرجى إضافة منتجات.");
        if (!name || !address) return alert("يرجى إدخال الاسم والعنوان بالكامل.");

        let productsList = cart.map(item => `${item.titleAr}`).join(' + ');

        // تنسيق الرسالة المطلوب
        let message = `مرحباً ${name}\n\n`;
        message += `تم استلام طلبك رقم ${orderId} بنجاح علي متجر RM\n\n`;
        message += `تفاصيل الطلب:\n${productsList}\n\n`;
        message += `إجمالي المبلغ: ${document.getElementById('cartTotalSum').innerText}\n\n`;
        message += `عنوان التوصيل:\n${address}\n\n`;
        message += `يرجى تأكيد الطلب أو إلغاؤه من خلال الأزرار بالأسفل.`;

        // غير الرقم ده لرقمك الحقيقي
        const phone = "201012345678"; 
        const whatsappUrl = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
        
        window.open(whatsappUrl, '_blank');
    }

    // يمكنك إضافة منتجاتك هنا أو التأكد أن زر "أضف للسلة" يضيف لـ مصفوفة cart
</script>

</body>
</html>
